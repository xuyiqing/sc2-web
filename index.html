<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SC² events</title>
<style>
  :root{
    --bg:#fbfbfa; --card:#fff; --line:#e7e6e1; --ink:#1f1f1d; --mut:#6b6a64; --faint:#94938c;
    --accent:#185FA5; --accent-bg:#E6F1FB; --warn:#854F0B; --warn-bg:#FAEEDA; --warn-line:#EF9F27;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:860px;margin:0 auto;padding:28px 18px 64px}
  h1{font-size:22px;font-weight:600;margin:0}
  .sub{color:var(--mut);font-size:14px;margin:2px 0 18px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
  .chips .lbl{font-size:13px;color:var(--faint);margin-right:2px}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:5px 12px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;user-select:none}
  .chip .dot{width:9px;height:9px;border-radius:50%}
  .chip[aria-pressed="false"]{opacity:.4}
  .day{margin:22px 0 8px;font-size:13px;font-weight:600;color:var(--mut);border-bottom:1px solid var(--line);padding-bottom:6px}
  .ev{display:flex;gap:12px;align-items:flex-start;padding:11px 6px;border-bottom:1px solid var(--line);cursor:pointer}
  .ev:hover{background:#f4f3ef}
  .bar{width:3px;align-self:stretch;border-radius:0;flex:none}
  .date{width:52px;flex:none;text-align:center;line-height:1.15}
  .date .m{font-size:12px;color:var(--faint)}
  .date .d{font-size:18px;font-weight:600}
  .date .t{font-size:11px;color:var(--faint)}
  .body{flex:1;min-width:0}
  .ti{font-size:15px}
  .meta{font-size:12px;color:var(--mut);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .badge{font-size:11px;padding:2px 8px;border-radius:999px;display:inline-flex;gap:4px;align-items:center}
  .rsvp{background:var(--warn-bg);color:var(--warn)}
  .caret{color:var(--faint);font-size:13px;flex:none;margin-top:2px}
  .detail{background:#f7f6f2;border-bottom:1px solid var(--line);padding:4px 16px 16px}
  .callout{display:flex;align-items:center;gap:10px;margin:8px 0 14px;padding:9px 12px;background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:8px;font-size:13px;color:var(--warn)}
  .callout a,.callout .pill{margin-left:auto;background:#fff;border:1px solid var(--warn-line);color:var(--warn);text-decoration:none;font-size:12px;padding:4px 12px;border-radius:6px;white-space:nowrap}
  .grid{display:grid;grid-template-columns:auto 1fr;gap:8px 12px;font-size:13px;align-items:start}
  .k{color:var(--faint);white-space:nowrap}
  .tag{font-size:11px;padding:2px 8px;border-radius:999px;background:#eceae3;color:#444441;margin-right:4px;display:inline-block}
  a{color:var(--accent)}
  .sub-cta{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:22px;padding:14px 16px;background:var(--accent-bg);border-radius:8px}
  .sub-cta .u{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;color:var(--accent);margin-top:4px;word-break:break-all}
  button.b{border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer}
  .empty{color:var(--faint);font-size:14px;padding:24px 0}
</style>
</head>
<body>
<div class="wrap">
  <h1>SC² events</h1>
  <div class="sub">Causal inference and data-driven methods, across disciplines — filter, preview, and subscribe.</div>
  <div class="chips" id="chips"></div>
  <div id="agenda"><div class="empty">Loading…</div></div>
  <div class="sub-cta" id="cta" style="display:none">
    <div>
      <span style="font-size:13px;color:var(--accent)">Subscribe to this view · <b id="dcount">0</b> disciplines</span>
      <div class="u" id="feedurl"></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="b" id="addg">Add to Google Calendar</button>
      <button class="b" id="copy">Copy feed link</button>
    </div>
  </div>
</div>
<script>
const SUBSCRIBE_BASE = 'https://script.google.com/macros/s/AKfycbw_TAuNxWeCchDaEo6e3o41H_DWCL3xSQ3LYde_KeGZFLa8cMWld0qKVSrjBkdnz2Rb/exec';
const COLORS = {
  'methodology':     {bar:'#534AB7', dot:'#534AB7', txt:'#3C3489'},
  'biomedicine':     {bar:'#0F6E56', dot:'#0F6E56', txt:'#085041'},
  'social-science':  {bar:'#993C1D', dot:'#993C1D', txt:'#712B13'},
  'data-science-ai': {bar:'#185FA5', dot:'#185FA5', txt:'#0C447C'},
  'engineering':     {bar:'#5F5E5A', dot:'#5F5E5A', txt:'#444441'}
};
const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const params = new URLSearchParams(location.search);
let FEED_URL = params.get('feed') || './events.sample.json';
if (FEED_URL === 'live') FEED_URL = SUBSCRIBE_BASE + '?feed=events.json';

let DATA = null, active = new Set(), open = new Set();
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

fetch(FEED_URL).then(r=>r.json()).then(d=>{
  DATA = d; active = new Set((d.facets.disciplines||[]).map(x=>x.slug)); render();
}).catch(e=>{ $('agenda').innerHTML = '<div class="empty">Could not load '+esc(FEED_URL)+': '+esc(e.message)+'</div>'; });

function render(){ renderChips(); renderAgenda(); renderCTA(); }

function renderChips(){
  const labels = {}; (DATA.facets.disciplines||[]).forEach(x=>labels[x.slug]=x.label);
  let h = '<span class="lbl">showing</span>';
  (DATA.facets.disciplines||[]).forEach(x=>{
    const on = active.has(x.slug), c = COLORS[x.slug]||{dot:'#888'};
    h += '<span class="chip" role="button" aria-pressed="'+on+'" data-s="'+x.slug+'">'+
         '<span class="dot" style="background:'+c.dot+'"></span>'+esc(x.label)+'</span>';
  });
  $('chips').innerHTML = h;
  $('chips').querySelectorAll('.chip').forEach(el=>el.onclick=()=>{
    const s = el.dataset.s; active.has(s)?active.delete(s):active.add(s); render();
  });
}

function inView(ev){ return ev.disciplines.some(d=>active.has(d)); }

function fmt(t){
  const tz = DATA.timezone || 'America/Los_Angeles';
  if(t.date){ const d=new Date(t.date+'T12:00:00'); return {key:t.date, m:M[d.getMonth()], d:d.getDate(), t:'all day', d2:d}; }
  const d = new Date(t.dateTime);
  const key = new Intl.DateTimeFormat('en-CA',{timeZone:tz}).format(d);
  const m = new Intl.DateTimeFormat('en',{month:'short',timeZone:tz}).format(d);
  const day = new Intl.DateTimeFormat('en',{day:'numeric',timeZone:tz}).format(d);
  const tm = new Intl.DateTimeFormat('en',{hour:'numeric',minute:'2-digit',timeZone:tz}).format(d).replace(' ','').toLowerCase();
  return {key, m, d:day, t:tm, d2:d};
}
function dayHeading(d2){ return new Intl.DateTimeFormat('en',{weekday:'long',month:'short',day:'numeric',timeZone:DATA.timezone}).format(d2); }

function renderAgenda(){
  const evs = (DATA.events||[]).filter(inView).slice().sort((a,b)=>{
    const ax=(a.start.dateTime||a.start.date), bx=(b.start.dateTime||b.start.date); return ax<bx?-1:ax>bx?1:0;
  });
  if(!evs.length){ $('agenda').innerHTML='<div class="empty">No events match the selected disciplines.</div>'; return; }
  let h='', lastKey='';
  evs.forEach(ev=>{
    const f = fmt(ev.start);
    if(f.key!==lastKey){ h+='<div class="day">'+esc(dayHeading(f.d2))+'</div>'; lastKey=f.key; }
    h += row(ev, f);
  });
  $('agenda').innerHTML = h;
  $('agenda').querySelectorAll('.ev').forEach(el=>el.onclick=()=>{
    const u=el.dataset.u; open.has(u)?open.delete(u):open.add(u); renderAgenda();
  });
}

function row(ev, f){
  const c = COLORS[ev.disciplines[0]]||{bar:'#888',txt:'#444'};
  const disc = ev.disciplines.map(d=>'<span style="color:'+(COLORS[d]||{}).txt+'">'+esc((labelOf(d)))+'</span>').join(', ');
  const loc = ev.location && ev.location.text ? ' · '+esc(ev.location.text.split(',')[0]) : '';
  let badges='';
  if(ev.rsvp && ev.rsvp.required==='yes'){
    let t='RSVP required'; if(ev.rsvp.deadline) t='RSVP by '+esc(ev.rsvp.deadline);
    badges += '<span class="badge rsvp">'+t+'</span>';
  } else if(ev.rsvp && ev.rsvp.required==='no'){ badges += '<span style="color:var(--faint)">drop-in</span>'; }
  const isOpen = open.has(ev.uid);
  let html = '<div class="ev" data-u="'+esc(ev.uid)+'">'+
    '<div class="bar" style="background:'+c.bar+'"></div>'+
    '<div class="date"><div class="m">'+f.m+'</div><div class="d">'+f.d+'</div><div class="t">'+esc(f.t)+'</div></div>'+
    '<div class="body"><div class="ti" style="font-weight:'+(isOpen?'600':'400')+'">'+esc(ev.title)+'</div>'+
    '<div class="meta"><span>'+(ev.series?esc(ev.series)+' · ':'')+disc+loc+'</span>'+badges+'</div>'+
    (isOpen?detail(ev):'')+
    '</div><div class="caret">'+(isOpen?'▲':'▼')+'</div></div>';
  return html;
}

function labelOf(slug){ const m=(DATA.facets.disciplines||[]).find(x=>x.slug===slug); return m?m.label:slug; }

function detail(ev){
  let h = '<div class="detail" onclick="event.stopPropagation()">';
  h += rsvpCallout(ev);
  h += '<div class="grid">';
  if(ev.location){ const j = ev.location.url?' · <a href="'+esc(ev.location.url)+'" target="_blank" rel="noopener">join</a>':'';
    h += k('Location')+v(esc(ev.location.text||(ev.location.online?'Online':''))+j); }
  if(ev.speaker){ h += k('Speaker')+v(esc(ev.speaker.name)+(ev.speaker.affiliation?' — '+esc(ev.speaker.affiliation):'')); }
  if(ev.topics&&ev.topics.length){ h += k('Topics')+v(ev.topics.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')); }
  if(ev.abstract){ h += k('Abstract')+v('<span style="color:var(--mut)">'+esc(ev.abstract)+'</span>'); }
  h += '</div>';
  const link = ev.links && (ev.links.canonical||ev.links.source);
  if(link){ h += '<div style="margin-top:14px"><a class="b" style="text-decoration:none;display:inline-block" href="'+esc(link)+'" target="_blank" rel="noopener">Details and source ↗</a></div>'; }
  h += '</div>';
  return h;
}
const k = t => '<span class="k">'+t+'</span>';
const v = h => '<span>'+h+'</span>';

function rsvpCallout(ev){
  const r = ev.rsvp||{required:'unknown'};
  if(r.required!=='yes') return '';
  let msg='RSVP required', right='';
  if(r.deadline) msg='RSVP required · by '+esc(r.deadline);
  if(r.note) msg+=' · '+esc(r.note);
  if((r.access==='page'||r.access==='public_form') && r.url){
    right='<a href="'+esc(r.url)+'" target="_blank" rel="noopener">Details and RSVP ↗</a>';
  } else if(r.access==='list'){
    msg='RSVP via '+esc(r.via||'the organizer');
    const join = ev.links && (ev.links.canonical||ev.links.source);
    right = join ? '<a href="'+esc(join)+'" target="_blank" rel="noopener">Join the list ↗</a>' : '<span class="pill">see organizer</span>';
  } else if(r.access==='contact'){
    msg='RSVP required · contact the organizer';
  } else if(r.url){ right='<a href="'+esc(r.url)+'" target="_blank" rel="noopener">Details and RSVP ↗</a>'; }
  return '<div class="callout"><span>'+msg+'</span>'+right+'</div>';
}

function renderCTA(){
  const slugs=[...active];
  $('cta').style.display='flex';
  $('dcount').textContent=slugs.length;
  const url = SUBSCRIBE_BASE + '?feed=ics&d=' + slugs.join(',');
  $('feedurl').textContent = slugs.length? url : '(select at least one discipline)';
  $('copy').onclick=()=>{ navigator.clipboard && navigator.clipboard.writeText(url); $('copy').textContent='Copied'; setTimeout(()=>$('copy').textContent='Copy feed link',1200); };
  $('addg').onclick=()=>{ window.open('https://calendar.google.com/calendar/u/0/r/settings/addbyurl?url='+encodeURIComponent(url),'_blank'); };
}
</script>
</body>
</html>
